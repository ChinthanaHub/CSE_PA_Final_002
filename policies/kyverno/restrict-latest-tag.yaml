---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      The 'latest' tag is mutable and non-reproducible. Images must use explicit,
      immutable tags (preferably digest-based: @sha256:...) for deterministic deployments.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: >-
          Using 'latest' or no image tag is not allowed. Use a specific version tag
          or image digest (@sha256:...) instead.
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image }}"
                    operator: NotContains
                    value: ":"

    - name: disallow-latest-tag-init
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "Init containers must not use 'latest' tag."
        foreach:
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
