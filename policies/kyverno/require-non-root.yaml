---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-user
  annotations:
    policies.kyverno.io/title: Require Non-Root Container User
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers must not run as root (UID 0). This policy requires runAsNonRoot: true
      or a runAsUser > 0. Running as root is a major attack surface.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-non-root
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "Containers must not run as root. Set securityContext.runAsNonRoot: true."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: "true"
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: "true"

    - name: require-readonly-rootfs
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "Root filesystem must be read-only. Set securityContext.readOnlyRootFilesystem: true."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: "true"

    - name: require-seccomp
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "Pods must use RuntimeDefault or Localhost seccomp profile."
        anyPattern:
          - spec:
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
          - spec:
              securityContext:
                seccompProfile:
                  type: Localhost
