---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits and Requests
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Containers without resource limits can consume all node resources, causing outages.
      This policy enforces CPU and memory requests and limits on all containers.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-limits-requests
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "CPU and memory requests and limits are required for all containers."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"

    - name: require-limits-init-containers
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "CPU and memory requests and limits are required for all init containers."
        pattern:
          spec:
            =(initContainers):
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"
