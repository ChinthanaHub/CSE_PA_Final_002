---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Privileged containers have access to all Linux capabilities and host resources.
      This policy blocks any container that sets privileged: true or allowPrivilegeEscalation: true.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: no-privileged-containers
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "Privileged containers are not allowed. Remove securityContext.privileged: true."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): "false"

    - name: no-privilege-escalation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "allowPrivilegeEscalation must be set to false."
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: "false"

    - name: drop-all-capabilities
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app, default]
      validate:
        message: "Containers must drop ALL capabilities."
        pattern:
          spec:
            containers:
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
