---
# Pull app secrets from AWS Secrets Manager into a Kubernetes Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      data:
        DB_PASSWORD: "{{ .db_password }}"
        API_KEY: "{{ .api_key }}"
        JWT_SECRET: "{{ .jwt_secret }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: cse-pa-final-dev/app/secrets
        property: DB_PASSWORD
    - secretKey: api_key
      remoteRef:
        key: cse-pa-final-dev/app/secrets
        property: API_KEY
    - secretKey: jwt_secret
      remoteRef:
        key: cse-pa-final-dev/app/secrets
        property: JWT_SECRET

---
# Pull DB credentials from Secrets Manager
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: cse-pa-final-dev/db/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: cse-pa-final-dev/db/credentials
        property: password
    - secretKey: host
      remoteRef:
        key: cse-pa-final-dev/db/credentials
        property: host
