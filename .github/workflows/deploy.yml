name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev]

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: "us-east-1"
  APP_NAME: "cse-pa-final-dev-app"

jobs:
  # ─────────────────────────────────────────
  # Build Docker Image
  # ─────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-image: ${{ steps.image-uri.outputs.ecr-image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-Build-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: app
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      # ── Container Scan (Trivy) ──
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # ── SBOM Generation (Syft) ──
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

      # ── Push Image to ECR (digest-based) ──
      - name: Push image to ECR
        id: push
        uses: docker/build-push-action@v5
        with:
          context: app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      # ── Construct Full ECR Image URI ──
      - name: Construct ECR image URI
        id: image-uri
        run: |
          ECR_IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}@${{ steps.push.outputs.digest }}"
          echo "ecr-image=${ECR_IMAGE}" >> $GITHUB_OUTPUT
          echo "Pushed image: ${ECR_IMAGE}"

      # ── Image Signing (Cosign) ──
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image with Cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            "${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}@${{ steps.push.outputs.digest }}"

  # ─────────────────────────────────────────
  # Terraform Apply — Dev
  # ─────────────────────────────────────────
  terraform-dev:
    name: Terraform Apply (Dev)
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    outputs:
      cluster-name: ${{ steps.tf-output.outputs.cluster_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-TF-Dev-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -out=tfplan.bin -input=false -no-color
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve -input=false tfplan.bin

      - name: Get Terraform Outputs
        id: tf-output
        working-directory: terraform/environments/dev
        run: |
          echo "cluster_name=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # Deploy to Dev EKS
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev EKS
    runs-on: ubuntu-latest
    needs: [build, terraform-dev]
    environment: dev
    env:
      KUBECONFIG: /home/runner/.kube/config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: GitHubActions-Deploy-Dev-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature before deploy
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ needs.build.outputs.ecr-image }}"
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Update kubeconfig
        run: |
          mkdir -p /home/runner/.kube
          aws eks update-kubeconfig \
            --name ${{ needs.terraform-dev.outputs.cluster-name }} \
            --region ${{ env.AWS_REGION }} \
            --kubeconfig /home/runner/.kube/config \
            --alias github-actions
          kubectl config view --kubeconfig /home/runner/.kube/config
          kubectl config use-context github-actions --kubeconfig /home/runner/.kube/config
          kubectl config current-context --kubeconfig /home/runner/.kube/config
          kubectl --kubeconfig /home/runner/.kube/config auth can-i list pods --all-namespaces || true

      - name: Apply Kubernetes manifests
        working-directory: ${{ github.workspace }}
        run: |
          echo "PWD=$(pwd)"
          ls -la .
          ls -la ./kubernetes
          ls -la ./kubernetes/secrets
          kubectl --kubeconfig /home/runner/.kube/config apply --validate=false -f ./kubernetes/rbac/
          kubectl --kubeconfig /home/runner/.kube/config apply --validate=false -f ./kubernetes/network-policies/

      - name: Install or reconcile External Secrets operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io 2>/dev/null || true
          helm repo update
          kubectl --kubeconfig /home/runner/.kube/config -n external-secrets delete secret external-secrets-webhook --ignore-not-found
          kubectl --kubeconfig /home/runner/.kube/config delete validatingwebhookconfiguration \
            -l app.kubernetes.io/name=external-secrets --ignore-not-found
          helm upgrade --install external-secrets external-secrets/external-secrets \
            -n external-secrets --create-namespace \
            --set installCRDs=true \
            --set certController.create=true \
            --set certController.requeueInterval=5m \
            --set webhook.create=true \
            --set resources.requests.cpu=100m \
            --set resources.requests.memory=128Mi \
            --set webhook.resources.requests.cpu=100m \
            --set webhook.resources.requests.memory=128Mi \
            --set certController.resources.requests.cpu=100m \
            --set certController.resources.requests.memory=128Mi \
            --wait --timeout 300s

      - name: Restart External Secrets webhook deployment
        run: |
          kubectl --kubeconfig /home/runner/.kube/config rollout restart deployment/external-secrets-webhook -n external-secrets
          kubectl --kubeconfig /home/runner/.kube/config rollout status deployment/external-secrets-webhook -n external-secrets --timeout=600s

      - name: Wait for External Secrets webhook readiness
        run: |
          kubectl --kubeconfig /home/runner/.kube/config rollout status \
            deployment/external-secrets-cert-controller -n external-secrets --timeout=180s
          kubectl --kubeconfig /home/runner/.kube/config rollout status \
            deployment/external-secrets-webhook -n external-secrets --timeout=180s
          for i in {1..30}; do
            ENDPOINTS=$(kubectl --kubeconfig /home/runner/.kube/config get endpoints external-secrets-webhook \
              -n external-secrets -o jsonpath='{.subsets[*].addresses[*].ip}')
            if [ -n "$ENDPOINTS" ]; then
              echo "External Secrets webhook endpoints ready: $ENDPOINTS"
              break
            fi
            echo "Waiting for external-secrets-webhook endpoints... ($i/30)"
            sleep 5
          done
          SECRET=$(kubectl --kubeconfig /home/runner/.kube/config get secret external-secrets-webhook -n external-secrets -o jsonpath='{.data.tls\.crt}' 2>/dev/null || true)
          if [ -z "$SECRET" ]; then
            echo "ERROR: external-secrets-webhook secret missing"; exit 1
          fi
          echo "$SECRET" | base64 -d > /tmp/webhook.crt
          openssl x509 -in /tmp/webhook.crt -text -noout | grep -A2 "Subject Alternative Name"
          if ! openssl x509 -in /tmp/webhook.crt -text -noout | grep -q "external-secrets-webhook.external-secrets.svc"; then
            echo "ERROR: webhook certificate SAN does not include external-secrets-webhook.external-secrets.svc"; exit 1
          fi

      - name: Verify live webhook service cert has the correct SAN
        run: |
          for i in {1..30}; do
            SAN=$(kubectl --kubeconfig /home/runner/.kube/config run -n external-secrets webhook-cert-check --rm -i --restart=Never --image=nicolaka/netshoot -- /bin/sh -c "openssl s_client -connect external-secrets-webhook.external-secrets.svc:443 -servername external-secrets-webhook.external-secrets.svc < /dev/null 2>/dev/null | openssl x509 -text -noout 2>/dev/null | grep -o 'external-secrets-webhook.external-secrets.svc' | head -1")
            if [ -n "$SAN" ]; then
              echo "OK: live webhook service cert has correct SAN"
              kubectl --kubeconfig /home/runner/.kube/config run -n external-secrets webhook-cert-check --rm -i --restart=Never --image=nicolaka/netshoot -- /bin/sh -c "openssl s_client -connect external-secrets-webhook.external-secrets.svc:443 -servername external-secrets-webhook.external-secrets.svc < /dev/null 2>/dev/null | openssl x509 -text -noout | grep -A2 'Subject Alternative Name'"
              exit 0
            fi
            echo "Waiting for live webhook cert ($i/30)..."
            sleep 10
          done
          echo "ERROR: live webhook service certificate still wrong after 5 minutes"
          kubectl --kubeconfig /home/runner/.kube/config logs -n external-secrets deployment/external-secrets-webhook --tail=100
          kubectl --kubeconfig /home/runner/.kube/config logs -n external-secrets deployment/external-secrets-cert-controller --tail=100
          exit 1

      - name: Apply External Secrets manifests
        run: |
          kubectl --kubeconfig /home/runner/.kube/config apply --validate=false -f ./kubernetes/secrets/

      - name: Deploy application (digest-based)
        run: |
          kubectl --kubeconfig /home/runner/.kube/config set image deployment/app \
            app="${{ needs.build.outputs.ecr-image }}" \
            -n app

          kubectl --kubeconfig /home/runner/.kube/config rollout status deployment/app -n app --timeout=300s

      - name: Apply Kyverno policies
        run: |
          kubectl --kubeconfig /home/runner/.kube/config apply --validate=false -f policies/kyverno/

      - name: Smoke test
        run: |
          kubectl --kubeconfig /home/runner/.kube/config get pods -n app
          kubectl --kubeconfig /home/runner/.kube/config wait --for=condition=ready pod -l app=app -n app --timeout=120s


