name: Fix External Secrets webhook cert

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Install kubectl and helm
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cse-pa-final-dev-cluster --region us-east-1

      - name: Diagnose current state
        run: |
          echo "=== Pods ==="
          kubectl get pods -n external-secrets || true
          echo "=== Deployments ==="
          kubectl get deployment -n external-secrets || true
          echo "=== Webhook serving secret ==="
          kubectl get secret external-secrets-webhook -n external-secrets \
            -o jsonpath='{.data.tls\.crt}' 2>/dev/null | base64 -d | \
            openssl x509 -text -noout 2>/dev/null | grep -A2 "Subject Alternative Name" || echo "(no valid cert yet)"

      - name: Clean reinstall
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          helm uninstall external-secrets -n external-secrets || true
          kubectl delete secret external-secrets-webhook -n external-secrets --ignore-not-found
          kubectl delete validatingwebhookconfiguration \
            -l app.kubernetes.io/name=external-secrets --ignore-not-found
          # Wait for finalizers to clear
          sleep 10

          helm install external-secrets external-secrets/external-secrets \
            -n external-secrets --create-namespace \
            --set installCRDs=true \
            --set certController.create=true \
            --set webhook.create=true \
            --set resources.requests.cpu=100m \
            --set resources.requests.memory=128Mi \
            --set webhook.resources.requests.cpu=100m \
            --set webhook.resources.requests.memory=128Mi \
            --set certController.resources.requests.cpu=100m \
            --set certController.resources.requests.memory=128Mi

      - name: Wait for cert-controller, webhook, controller
        run: |
          kubectl rollout status deployment/external-secrets-cert-controller \
            -n external-secrets --timeout=240s
          kubectl rollout status deployment/external-secrets-webhook \
            -n external-secrets --timeout=240s
          kubectl rollout status deployment/external-secrets \
            -n external-secrets --timeout=240s

      - name: Verify webhook cert has the correct SAN
        run: |
          for i in {1..30}; do
            SAN=$(kubectl get secret external-secrets-webhook -n external-secrets \
              -o jsonpath='{.data.tls\.crt}' 2>/dev/null | base64 -d 2>/dev/null | \
              openssl x509 -text -noout 2>/dev/null | \
              grep -o "external-secrets-webhook.external-secrets.svc" | head -1)
            if [ -n "$SAN" ]; then
              echo "OK: webhook cert has correct SAN"
              kubectl get secret external-secrets-webhook -n external-secrets \
                -o jsonpath='{.data.tls\.crt}' | base64 -d | \
                openssl x509 -text -noout | grep -A2 "Subject Alternative Name"
              exit 0
            fi
            echo "Waiting for valid cert ($i/30)..."
            sleep 10
          done
          echo "Webhook cert still wrong after 5 minutes — dumping cert-controller logs"
          kubectl logs -n external-secrets deployment/external-secrets-cert-controller --tail=100
          exit 1

      - name: Apply External Secrets manifests
        run: |
          # Replace ACCOUNT_ID placeholder if still present
          if grep -rq "ACCOUNT_ID" kubernetes/secrets/; then
            sed -i "s/ACCOUNT_ID/$(aws sts get-caller-identity --query Account --output text)/g" kubernetes/secrets/*.yaml
          fi
          kubectl apply -f kubernetes/secrets/
          kubectl get secretstore,externalsecret -A